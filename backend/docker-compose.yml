name: doctraceai

services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live')",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.workers.document_worker"]
    env_file:
      - path: .env
        required: false
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.9.0
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:0.9.0
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3 && ollama pull nomic-embed-text"]
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  qdrant_data:
  ollama_data:
